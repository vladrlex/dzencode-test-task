version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dzencode-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dzencode
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: dzencode-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: dzencode
      PORT: 5000
      JWT_SECRET: c2b5dcee167e95e08e30ee93ee99c8dcb347a27ce057d63dbe32609eb408cb68a45ca189ddc0971fc513081d60a399b6
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: dzencode-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data: